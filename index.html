<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>KRA Employee Form</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <div class="container">

        <div class="header">

            <h1>KRA Employee Form</h1>

            <p>
                Complete department work details
            </p>

        </div>
        <div class="deadlineBar">

    <div class="deadlineInfo">

        <div class="deadlineTitle">
            KRA Submission Deadline
        </div>

        <div class="deadlineDate">
            20 June 2026
        </div>

    </div>

    <div id="countdownMini">
        Loading...
    </div>

</div>

        <div class="grid">

            <div class="field employee">

                <label>
                    Employee Name
                </label>

                <input id="employee" placeholder="Enter employee name">

            </div>
            <div class="field">

                <label>
                    Company
                </label>

                <select id="company">

                    <option value="">
                        Select Company
                    </option>

                    <option>
                        Whatnot India Pvt Ltd - HYDERABAD
                    </option>
                    <option>
                        Whatnot India Pvt Ltd - CHENNAI
                    </option>
                    <option>
                        Whatnot India Pvt Ltd - BANGLORE
                    </option>
                    <option>
                        Whatnot India Pvt Ltd - DELHI
                    </option>

                    <option>
                        Inizio Lifestyle Pvt Ltd
                    </option>

                    <option>
                        Auric Lifestyle Pvt Ltd
                    </option>

                    <option>
                        Wavetone Distribution Pvt Ltd
                    </option>

                    <option>
                        HYPERCUDE Retail LLP
                    </option>

                </select>

            </div>

            <div class="field">

                <label>
                    Department
                </label>

                <select id="department">

                    <option value="">
                        Select Department
                    </option>

                </select>

            </div>

            <div class="field">

                <label>
                    Company Email / Personal Email
                </label>

                <input id="email" type="email" placeholder="Enter company email">

            </div>

            <div class="field">

                <label>
                    Designation
                </label>

                <input id="designation" placeholder="Enter designation">

            </div>
            <div class="field">

<label>
Reporting To
</label>

<input
id="reportingTo"
placeholder="Enter Reporting Manager">

</div>

        </div>

        <div class="actions">

            <button id="nextBtn" onclick="showQuestions()">

                Next →

            </button>

        </div>

        <div id="questionSection" style="display:none;">

            <h2>

                Work Details

            </h2>
            <div
id="workError"
class="workError"
style="display:none;">
</div>

            <div id="works">

            </div>

        </div>

        <div id="employeeFeedback" style="display:none;">

            <h2>

                Additional Details

            </h2>

           <div class="feedbackCard">

<label>
Do you have any concerns, suggestions, or need any assistance related to your work?
</label>

<textarea
id="concerns"
placeholder="Write concerns, suggestions or type NA"></textarea>

                <label>

                    Do you come to the office in accordance with the company’s grooming and professional appearance
                    standards?

                </label>

                <select id="grooming">

                    <option value="">
                        Select
                    </option>

                    <option>
                        A. Consistently maintain professional appearance
                    </option>

                    <option>
                        B. Follow standards but sometimes improvement needed
                    </option>

                    <option>
                        C. Dress appropriately but grooming inconsistent
                    </option>

                    <option>
                        D. Grooming maintained but dress code inconsistent
                    </option>

                    <option>
                        E. Aware and improving compliance
                    </option>

                    <option>
                        F. Not fully aware of expectations
                    </option>

                </select>

            </div>

        </div>

        <button id="submitBtn" style="display:none" onclick="submitForm()">

            Submit KRA

        </button>

    </div>

    <script src="script.js">

    </script>

</body>

</html>
